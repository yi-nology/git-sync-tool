name: Release Build

on:
  push:
    tags:
      - 'v*'  # 当推送 v* 格式的 tag 时触发（如 v1.0.0）
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write  # 需要写权限来创建 release

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Linux AMD64
          - goos: linux
            goarch: amd64
            output: git-manage-service-linux-amd64
          # Linux ARM64
          - goos: linux
            goarch: arm64
            output: git-manage-service-linux-arm64
          # macOS AMD64 (Intel)
          - goos: darwin
            goarch: amd64
            output: git-manage-service-darwin-amd64
          # macOS ARM64 (Apple Silicon)
          - goos: darwin
            goarch: arm64
            output: git-manage-service-darwin-arm64
          # Windows AMD64
          - goos: windows
            goarch: amd64
            output: git-manage-service-windows-amd64.exe
          # Windows ARM64
          - goos: windows
            goarch: arm64
            output: git-manage-service-windows-arm64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Get dependencies
        run: go mod download

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        run: make build-frontend-integrate

      - name: Sync frontend assets to embed directory
        run: |
          rm -rf pkg/embed/public/*
          cp -r public/* pkg/embed/public/
          rm -rf pkg/embed/docs/*
          cp -r docs/* pkg/embed/docs/ 2>/dev/null || true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          VERSION: ${{ github.ref_name }}
          BUILD_TIME: ${{ github.event.head_commit.timestamp }}
          GIT_COMMIT: ${{ github.sha }}
        run: |
          mkdir -p dist
          go build -ldflags="-s -w -X github.com/yi-nology/git-manage-service/pkg/appinfo.Version=${VERSION} -X github.com/yi-nology/git-manage-service/pkg/appinfo.BuildTime=${BUILD_TIME} -X github.com/yi-nology/git-manage-service/pkg/appinfo.GitCommit=${GIT_COMMIT}" \
            -o dist/${{ matrix.output }} \
            ./cmd/server

      - name: Create archive
        run: |
          cd dist
          # 复制配置文件和文档到打包目录
          cp -r ${{ github.workspace }}/conf .
          cp ${{ github.workspace }}/README.md .
          cp ${{ github.workspace }}/LICENSE* . 2>/dev/null || true
          
          # 确保配置文件存在
          ls -la conf/
          
          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            zip -r ${{ matrix.output }}.zip ${{ matrix.output }} conf README.md LICENSE* 2>/dev/null || zip -r ${{ matrix.output }}.zip ${{ matrix.output }} conf README.md
            echo "ASSET=${{ matrix.output }}.zip" >> $GITHUB_ENV
          else
            tar -czf ${{ matrix.output }}.tar.gz ${{ matrix.output }} conf README.md LICENSE* 2>/dev/null || tar -czf ${{ matrix.output }}.tar.gz ${{ matrix.output }} conf README.md
            echo "ASSET=${{ matrix.output }}.tar.gz" >> $GITHUB_ENV
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: dist/${{ env.ASSET }}
          retention-days: 5

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## 🚀 Release ${{ github.ref_name }}
            
            ### ✨ 特性说明
            
            - ✅ **前后端一体化**: 包含完整的 Web UI 界面
            - ✅ **多平台支持**: Linux、macOS、Windows (AMD64/ARM64)
            - ✅ **开箱即用**: 单一二进制文件，无需额外依赖
            - ✅ **版本信息**: 自动注入版本号、构建时间、Git 提交
            
            ### 📦 下载说明
            
            根据你的操作系统选择对应的文件：
            
            - **Linux (AMD64)**: `git-manage-service-linux-amd64.tar.gz`
            - **Linux (ARM64)**: `git-manage-service-linux-arm64.tar.gz`
            - **macOS (Intel)**: `git-manage-service-darwin-amd64.tar.gz`
            - **macOS (Apple Silicon)**: `git-manage-service-darwin-arm64.tar.gz`
            - **Windows (AMD64)**: `git-manage-service-windows-amd64.exe.zip`
            - **Windows (ARM64)**: `git-manage-service-windows-arm64.exe.zip`
            
            ### 📝 快速开始
            
            #### Linux / macOS
            ```bash
            # 1. 解压
            tar -xzf git-manage-service-*.tar.gz
            
            # 2. 添加执行权限
            chmod +x git-manage-service-*
            
            # 3. 运行
            ./git-manage-service-* --mode=all
            
            # 4. 访问 Web UI
            # 打开浏览器访问: http://localhost:8080
            ```
            
            #### Windows
            ```powershell
            # 1. 解压 zip 文件
            
            # 2. 运行（命令行）
            .\git-manage-service-windows-amd64.exe --mode=all
            
            # 3. 访问 Web UI
            # 打开浏览器访问: http://localhost:8080
            ```
            
            ### 🔧 配置
            
            首次运行前，请参考以下文档进行配置：
            
            - 📖 [配置指南](https://github.com/${{ github.repository }}/blob/main/deploy/CONFIG_GUIDE.md)
            - 📖 [部署文档](https://github.com/${{ github.repository }}/blob/main/DEPLOY.md)
            - 📖 [产品手册](https://github.com/${{ github.repository }}/blob/main/docs/product_manual.md)
            
            ### 🐛 问题反馈
            
            如遇到问题，请在 [Issues](https://github.com/${{ github.repository }}/issues) 中反馈。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
