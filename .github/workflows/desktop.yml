name: Desktop Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., v0.7.5)'
        required: false

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build macOS app
        run: |
          wails build -platform darwin/universal -clean
          cd build/bin
          zip -r GitManageService-macOS.zip "Git Manage Service.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: build/bin/GitManageService-macOS.zip

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Windows exe
        run: |
          wails build -platform windows/amd64 -clean -nsis
          Compress-Archive -Path build/bin/* -DestinationPath GitManageService-Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: GitManageService-Windows.zip

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Linux packages
        run: |
          # Build DEB
          wails build -platform linux/amd64 -clean -deb
          
          # Build RPM (需要额外工具，可选)
          # wails build -platform linux/amd64 -clean -rpm
          
          # Build AppImage
          wails build -platform linux/amd64 -clean -appimage
          
          # Package all
          cd build/bin
          tar -czf GitManageService-Linux.tar.gz *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-app
          path: build/bin/GitManageService-Linux.tar.gz

  release:
    name: Create Desktop Release
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## 🖥️ Desktop Application Release ${{ github.ref_name }}
            
            ### 📦 Downloads
            
            - **macOS**: `GitManageService-macOS.zip`
            - **Windows**: `GitManageService-Windows.zip`  
            - **Linux**: `GitManageService-Linux.tar.gz` (包含 DEB 和 AppImage)
            
            ### 🚀 快速开始
            
            #### macOS
            1. 下载并解压 `GitManageService-macOS.zip`
            2. 双击打开 `Git Manage Service.app`
            3. 首次运行可能需要在"系统偏好设置 > 安全性与隐私"中允许
            
            #### Windows
            1. 下载并解压 `GitManageService-Windows.zip`
            2. 双击 `git-manage-desktop.exe` 运行
            3. 或运行安装程序进行安装
            
            #### Linux
            1. 下载并解压 `GitManageService-Linux.tar.gz`
            2. DEB: `sudo dpkg -i git-manage-desktop.deb`
            3. AppImage: `chmod +x git-manage-desktop.AppImage && ./git-manage-desktop.AppImage`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
