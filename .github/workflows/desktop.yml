name: Desktop Build

on:
  push:
    tags:
      - 'v*-desktop'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., v0.8.0)'
        required: false

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build macOS app
        run: |
          export WAILS_BUILD=1
          wails build -platform darwin/universal -skipbindings
          cd build/bin
          if [ -d "Git Manage Service.app" ]; then
            zip -r GitManageService-macOS.zip "Git Manage Service.app"
          elif [ -f "git-manage-desktop" ]; then
            zip GitManageService-macOS.zip git-manage-desktop
          else
            echo "Build output not found"
            ls -la
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: build/bin/GitManageService-macOS.zip

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Windows exe
        run: |
          $env:WAILS_BUILD="1"
          wails build -platform windows/amd64 -skipbindings
          Compress-Archive -Path build/bin/* -DestinationPath GitManageService-Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: GitManageService-Windows.zip

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          sudo apt-get update
          # Ubuntu 24.04 只有 webkit2gtk-4.1，但 Wails 需要 4.0
          # 所以安装 4.1 并创建符号链接
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev build-essential pkg-config
          # 创建符号链接让 Wails 能找到 webkit2gtk-4.0
          if [ -f /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.1.pc ] && [ ! -f /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.0.pc ]; then
            sudo ln -s /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.1.pc /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.0.pc
            sudo ln -s /usr/lib/x86_64-linux-gnu/pkgconfig/javascriptcoregtk-4.1.pc /usr/lib/x86_64-linux-gnu/pkgconfig/javascriptcoregtk-4.0.pc
            echo "Created symlinks: webkit2gtk-4.1 -> webkit2gtk-4.0"
          fi

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Linux packages
        run: |
          export WAILS_BUILD=1
          wails build -platform linux/amd64 -skipbindings
          cd build/bin
          tar -czf GitManageService-Linux.tar.gz git-manage-desktop

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-app
          path: build/bin/GitManageService-Linux.tar.gz

  release:
    name: Create Desktop Release
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## 🖥️ Desktop Application Release ${{ github.ref_name }}
            
            ### 📦 Downloads
            
            - **macOS**: `GitManageService-macOS.zip` (Universal Binary)
            - **Windows**: `GitManageService-Windows.zip` (64-bit)
            - **Linux**: `GitManageService-Linux.tar.gz` (64-bit)
            
            ### 🚀 快速开始
            
            #### macOS
            1. 下载并解压 `GitManageService-macOS.zip`
            2. 双击 `Git Manage Service.app`
            3. 首次运行可能需要在"系统偏好设置 > 安全性与隐私"中允许
            
            #### Windows
            1. 下载并解压 `GitManageService-Windows.zip`
            2. 双击 `git-manage-desktop.exe` 运行
            
            #### Linux
            ```bash
            tar -xzf GitManageService-Linux.tar.gz
            chmod +x git-manage-desktop
            ./git-manage-desktop
            ```
            
            ### 📝 功能说明
            
            桌面应用集成了完整的 Web UI，双击启动后会：
            1. 自动启动后端服务（端口 38080）
            2. 打开图形界面显示 Web UI
            3. 支持所有 Web 版本的功能
            
            ### ⚙️ 技术栈
            
            - **前端**: Vue 3 + Vite + Element Plus
            - **后端**: Go + Hertz
            - **桌面框架**: Wails v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
