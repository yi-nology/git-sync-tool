// idl/biz/stats.proto - Stats 相关 API 定义
syntax = "proto2";

package stats;

import "api.proto";
import "common.proto";

option go_package = "/stats";

// Stats 服务
service StatsService {
    // 分支统计 API
    rpc ListBranches(StatsRequest) returns (BranchesResponse) {
        option (api.get) = "/api/v1/stats/branches";
    }
    
    // 作者统计 API
    rpc ListAuthors(StatsRequest) returns (AuthorsResponse) {
        option (api.get) = "/api/v1/stats/authors";
    }
    
    // 提交统计 API
    rpc ListCommits(CommitsRequest) returns (CommitsResponse) {
        option (api.get) = "/api/v1/stats/commits";
    }
    
    // 分析统计 API
    rpc GetStats(StatsRequest) returns (StatsResponse) {
        option (api.get) = "/api/v1/stats/analyze";
    }
    
    // 导出统计 API
    rpc ExportCSV(StatsRequest) returns (common.EmptyResponse) {
        option (api.get) = "/api/v1/stats/export/csv";
    }
    
    // 代码行统计 API
    rpc GetLineStats(LineStatsRequest) returns (LineStatsResponse) {
        option (api.get) = "/api/v1/stats/lines";
    }
    
    rpc GetLineStatsConfig(common.EmptyRequest) returns (LineStatsConfigResponse) {
        option (api.get) = "/api/v1/stats/lines/config";
    }
    
    rpc SaveLineStatsConfig(LineStatsConfigRequest) returns (common.EmptyResponse) {
        option (api.post) = "/api/v1/stats/lines/config";
    }
    
    rpc ExportLineStatsCSV(LineStatsExportRequest) returns (common.EmptyResponse) {
        option (api.get) = "/api/v1/stats/lines/export/csv";
    }
}

// 代码行统计请求
message LineStatsRequest {
    optional string repo_key = 1 [(api.query) = "repo_key"];
    optional string branch = 2 [(api.query) = "branch"];
    optional string path = 3 [(api.query) = "path"];
    optional bool include_submodules = 4 [(api.query) = "include_submodules"];
}

// 代码行统计响应
message LineStatsResponse {
    optional common.BaseResponse base = 1;
    optional LineStatsData data = 2;
}

// 代码行统计数据
message LineStatsData {
    optional int64 total_lines = 1;
    optional int64 code_lines = 2;
    optional int64 comment_lines = 3;
    optional int64 blank_lines = 4;
    repeated LanguageStats languages = 5;
    optional string branch = 6;
    optional string repo_key = 7;
}

// 语言统计
message LanguageStats {
    optional string language = 1;
    optional int64 lines = 2;
    optional int64 code_lines = 3;
    optional int64 comment_lines = 4;
    optional int64 blank_lines = 5;
    optional string extension = 6;
    optional float percentage = 7;
}

// 代码行统计配置请求
message LineStatsConfigRequest {
    optional bool enable_submodule_scan = 1;
    optional bool enable_comment_detection = 2;
    repeated string excluded_paths = 3;
    repeated string excluded_extensions = 4;
    optional int64 max_file_size = 5;
}

// 代码行统计配置响应
message LineStatsConfigResponse {
    optional common.BaseResponse base = 1;
    optional LineStatsConfig config = 2;
}

// 代码行统计配置
message LineStatsConfig {
    optional bool enable_submodule_scan = 1;
    optional bool enable_comment_detection = 2;
    repeated string excluded_paths = 3;
    repeated string excluded_extensions = 4;
    optional int64 max_file_size = 5;
}

// 代码行统计导出请求
message LineStatsExportRequest {
    optional string repo_key = 1 [(api.query) = "repo_key"];
    optional string branch = 2 [(api.query) = "branch"];
    optional string format = 3 [(api.query) = "format"];
}

// 通用统计请求
message StatsRequest {
    optional string repo_key = 1 [(api.query) = "repo_key"];
    optional string branch = 2 [(api.query) = "branch"];
    optional string since = 3 [(api.query) = "since"];
    optional string until = 4 [(api.query) = "until"];
}

// 分支响应
message BranchesResponse {
    optional common.BaseResponse base = 1;
    repeated string branches = 2;
}

// 作者信息
message AuthorInfo {
    optional string name = 1;
    optional string email = 2;
}

// 作者响应
message AuthorsResponse {
    optional common.BaseResponse base = 1;
    repeated AuthorInfo authors = 2;
}

// 提交请求
message CommitsRequest {
    optional string repo_key = 1 [(api.query) = "repo_key"];
    optional string branch = 2 [(api.query) = "branch"];
    optional string since = 3 [(api.query) = "since"];
    optional string until = 4 [(api.query) = "until"];
}

// 提交信息
message CommitInfo {
    optional string hash = 1;
    optional string message = 2;
    optional string author = 3;
    optional string date = 4;
}

// 提交响应
message CommitsResponse {
    optional common.BaseResponse base = 1;
    repeated CommitInfo commits = 2;
}

// 统计响应
message StatsResponse {
    optional common.BaseResponse base = 1;
    optional StatsData data = 2;
}

// 统计数据
message StatsData {
    optional int64 total_commits = 1;
    optional int64 total_files = 2;
    optional int64 total_lines = 3;
    repeated AuthorStats authors = 4;
    repeated CommitStats commits = 5;
}

// 作者统计
message AuthorStats {
    optional string name = 1;
    optional string email = 2;
    optional int64 commits = 3;
    optional int64 lines = 4;
}

// 提交统计
message CommitStats {
    optional string date = 1;
    optional int64 count = 2;
}
